<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Spanish Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0d1a;
      --surface: #1a1a2e;
      --card:    #16213e;
      --border:  #2d2d5e;
      --accent:  #e94560;
      --text:    #eaeaea;
      --muted:   #777;
      --green:   #00c896;
      --red:     #ff4757;
      --yellow:  #ffd32a;
      --purple:  #7c4dff;
      --radius:  10px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Login overlay ─────────────────────────────────── */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #login-overlay.hidden { display: none; }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 340px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.4rem; margin-bottom: 6px; }
    .login-box p  { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 16px;
      background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 1rem;
      outline: none; margin-bottom: 14px;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-err { color: var(--red); font-size: 0.85rem; margin-bottom: 10px; min-height: 20px; }

    /* ── Layout ────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    header h1 { font-size: 1.1rem; color: var(--accent); }
    .main-content { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Stat cards ────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
    }
    .stat-card .val { font-size: 2rem; font-weight: 900; color: var(--accent); }
    .stat-card .lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    /* ── Toolbar ────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar h2 { font-size: 1rem; flex: 1; }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      padding: 9px 20px; border: none; border-radius: var(--radius);
      font-size: 0.87rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s; letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-green   { background: var(--green);  color: #000; }
    .btn-red     { background: var(--red);    color: #fff; }
    .btn-muted   { background: var(--border); color: var(--text); }
    .btn:hover   { opacity: 0.85; }

    /* ── Table ──────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      background: var(--surface); padding: 12px 14px;
      text-align: left; font-size: 0.73rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.incomplete td { color: var(--muted); }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
    }
    .badge-green  { background: rgba(0,200,150,0.18); color: var(--green); }
    .badge-yellow { background: rgba(255,211,42,0.15); color: var(--yellow); }
    .badge-red    { background: rgba(255,71,87,0.15);  color: var(--red); }
    .badge-muted  { background: var(--border); color: var(--muted); }

    /* ── Detail panel ────────────────────────────────────── */
    #detail-panel {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      align-items: flex-start; justify-content: center;
      padding: 24px 16px;
      overflow-y: auto;
    }
    #detail-panel.open { display: flex; }
    .detail-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%; max-width: 760px;
      padding: 28px;
      position: relative;
    }
    .detail-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--border); border: none; border-radius: 8px;
      color: var(--text); padding: 6px 12px; cursor: pointer; font-size: 0.85rem;
    }
    .detail-header { margin-bottom: 20px; }
    .detail-header h2 { font-size: 1.2rem; }
    .detail-header .sub { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }

    .detail-section { margin-bottom: 24px; }
    .detail-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

    .log-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.84rem;
    }
    .log-row:last-child { border-bottom: none; }
    .log-row .icon { flex-shrink: 0; width: 20px; }
    .log-row .q-text { flex: 1; }
    .log-row .chosen  { color: var(--muted); font-size: 0.78rem; }
    .log-row .answer  { color: var(--green); font-size: 0.78rem; }

    .reading-passage-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid #4fc3f7;
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 18px;
      line-height: 1.75;
      font-size: 0.88rem;
      white-space: pre-wrap;
      margin-bottom: 10px;
      color: var(--text);
    }
    .open-q-box {
      background: rgba(124,77,255,0.1);
      border: 1px solid rgba(124,77,255,0.35);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 0.88rem;
      font-style: italic;
      color: #c4b5fd;
      margin-bottom: 14px;
    }
    .open-response-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--purple);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 18px;
      line-height: 1.6;
      font-size: 0.9rem;
      white-space: pre-wrap;
      margin-bottom: 14px;
    }
    .rubric-box {
      background: rgba(0,200,150,0.07);
      border: 1px solid rgba(0,200,150,0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.81rem;
      margin-bottom: 14px;
      line-height: 1.7;
    }
    .rubric-box strong { color: var(--green); margin-right: 4px; }
    .rubric-box .rubric-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
    .grade-form { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .grade-form label { font-size: 0.85rem; color: var(--muted); }
    .grade-form select, .grade-form input[type=text] {
      padding: 8px 12px; background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.85rem; outline: none;
    }
    .grade-form select:focus, .grade-form input:focus { border-color: var(--accent); }
    .grade-form input[type=text] { flex: 1; min-width: 200px; }

    /* ── Paper test scan panel ──────────────────────────── */
    #scan-panel {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      align-items: flex-start; justify-content: center;
      padding: 24px 16px; overflow-y: auto;
    }
    #scan-panel.open { display: flex; }
    .scan-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; width: 100%; max-width: 680px; padding: 28px;
      position: relative;
    }
    .scan-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--border); border: none; border-radius: 8px;
      color: var(--text); padding: 6px 12px; cursor: pointer; font-size: 0.85rem;
    }
    .scan-field { margin-bottom: 14px; }
    .scan-field label { display: block; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .scan-field input[type=text], .scan-field input[type=file] {
      width: 100%; padding: 10px 14px;
      background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.9rem; outline: none;
    }
    .scan-field input:focus { border-color: var(--accent); }
    .grade-result-box {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px; margin-top: 18px; font-size: 0.87rem;
    }
    .grade-result-box h3 { margin-bottom: 12px; font-size: 1rem; }
    .grade-result-score { font-size: 2rem; font-weight: 900; color: var(--accent); }
    .grade-q-row { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .grade-q-row:last-child { border-bottom: none; }
    .grade-q-row .gq-num { width: 28px; flex-shrink: 0; color: var(--muted); }
    .grade-q-row .gq-marked { width: 28px; font-weight: bold; }
    .grade-q-row .gq-correct { width: 28px; color: var(--green); }

    /* ── Print tests table section ── */
    .paper-section { margin-top: 40px; }
    .paper-version-select {
      padding: 8px 12px; background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.85rem; outline: none;
    }
    .paper-version-select:focus { border-color: var(--accent); }
    .code-chip {
      display: inline-block; background: rgba(255,211,42,0.2); color: var(--yellow);
      font-weight: 800; letter-spacing: 2px; padding: 2px 10px; border-radius: 6px;
      font-size: 0.92rem; font-family: monospace;
    }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ───────────────────────────────────────────── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 22px; font-size: 0.88rem; transition: transform 0.3s; z-index: 9999; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ── Login Overlay ──────────────────────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-box">
    <h1>🔒 Admin Login</h1>
    <p>Spanish Quiz · Admin Panel</p>
    <div class="login-err" id="login-err"></div>
    <input type="password" id="admin-password" placeholder="Password"
      onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ── Main App ───────────────────────────────────────────────────────── -->
<header>
  <h1>🇪🇸 Spanish Quiz — Admin Panel</h1>
  <button class="btn btn-muted" onclick="doLogout()">Log Out</button>
</header>

<div class="main-content">
  <div id="app-content">
    <div class="spinner"></div>
  </div>
</div>

<!-- ── Detail Panel ───────────────────────────────────────────────────── -->
<div id="detail-panel">
  <div class="detail-box">
    <button class="detail-close" onclick="closeDetail()">✕ Close</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ── Scan Grade Panel ────────────────────────────────────────────────── -->
<div id="scan-panel">
  <div class="scan-box">
    <button class="scan-close" onclick="closeScanPanel()">✕ Close</button>
    <h2 style="margin-bottom:18px">📷 Grade Paper Scan</h2>

    <div class="scan-field">
      <label>Test Code (from answer sheet)</label>
      <input type="text" id="scan-code" placeholder="e.g. AB3XYZ" maxlength="6"
        style="text-transform:uppercase;letter-spacing:3px;font-size:1.1rem;font-weight:bold" />
    </div>
    <div class="scan-field">
      <label>Student Name (optional — override if not on sheet)</label>
      <input type="text" id="scan-student" placeholder="Student's name" />
    </div>
    <div class="scan-field">
      <label>Upload Answer Sheet Scan (JPG, PNG, or WEBP — images only, not PDF)</label>
      <input type="file" id="scan-file" accept="image/jpeg,image/png,image/webp,image/gif" />
      <p style="font-size:0.75rem;color:var(--muted);margin-top:6px">
        Scan or photo of <strong>page 5 (the answer sheet)</strong>. If you have a PDF scan, open it and export/screenshot page 5 as a JPG or PNG first.
      </p>
    </div>

    <button class="btn btn-primary" id="scan-submit-btn" onclick="submitScan()" style="width:100%;margin-top:4px">
      ✨ Grade with AI
    </button>
    <div id="scan-status" style="margin-top:14px;font-size:0.85rem;color:var(--muted);min-height:20px"></div>
    <div id="scan-result"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let sessions = [];
  let stats = {};

  // ── Toast ─────────────────────────────────────────────────────────────────
  function toast(msg, d = 2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), d);
  }

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function checkAuth() {
    const r = await fetch('/api/admin/check');
    const d = await r.json();
    return d.loggedIn;
  }

  async function doLogin() {
    const pw = document.getElementById('admin-password').value;
    document.getElementById('login-err').textContent = '';
    try {
      const r = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (r.ok) {
        document.getElementById('login-overlay').classList.add('hidden');
        loadDashboard();
      } else {
        document.getElementById('login-err').textContent = 'Incorrect password.';
      }
    } catch { document.getElementById('login-err').textContent = 'Connection error.'; }
  }

  async function doLogout() {
    await fetch('/api/admin/logout', { method: 'POST' });
    location.reload();
  }

  // ── Dashboard ─────────────────────────────────────────────────────────────
  async function loadDashboard() {
    document.getElementById('app-content').innerHTML = '<div class="spinner"></div>';
    try {
      const [sRes, stRes, pcRes] = await Promise.all([
        fetch('/api/admin/sessions'),
        fetch('/api/admin/stats'),
        fetch('/api/admin/partials/count'),
      ]);
      sessions = await sRes.json();
      stats    = await stRes.json();
      renderDashboard();
      // Update partial count badge after render
      try {
        const pcData = await pcRes.json();
        const el = document.getElementById('partial-count');
        if (el) el.textContent = pcData.count;
      } catch (_) {}
    } catch (e) {
      document.getElementById('app-content').innerHTML =
        '<p style="color:var(--red);padding:40px">Failed to load data.</p>';
    }
  }

  function renderDashboard() {
    const completed = sessions.filter(s => s.completed_at);
    const unreviewed = completed.filter(s => !s.reviewed);

    let html = `
      <div class="stats-grid">
        <div class="stat-card"><div class="val">${stats.total ?? 0}</div><div class="lbl">Total Attempts</div></div>
        <div class="stat-card"><div class="val">${unreviewed.length}</div><div class="lbl">Needs Review</div></div>
        <div class="stat-card"><div class="val">${stats.avg != null ? stats.avg + '%' : '—'}</div><div class="lbl">Avg MC Score</div></div>
        <div class="stat-card"><div class="val">${stats.best != null ? stats.best + '%' : '—'}</div><div class="lbl">Best Score</div></div>
        <div class="stat-card" title="Weakest category"><div class="val" style="font-size:1rem;padding-top:6px">${stats.weakCat ?? '—'}</div><div class="lbl">Weak Category</div></div>
      </div>

      <div class="toolbar">
        <h2>All Attempts (${sessions.length})</h2>
        <a href="/api/admin/study-guide" target="_blank" class="btn btn-green" style="text-decoration:none">📚 Open Study Guide</a>
        <a href="/api/admin/export.csv" class="btn btn-muted" download>⬇ Export CSV</a>
        <button class="btn btn-red" onclick="regradeAll()" title="Reset all open-response scores so you can re-grade with the new 0–3 rubric">↺ Regrade All Open</button>
        <button class="btn btn-red" id="delete-partials-btn" onclick="deletePartials()" title="Delete incomplete/abandoned test attempts">🗑️ Delete Partials (<span id="partial-count">?</span>)</button>
        <button class="btn btn-primary" onclick="loadDashboard()">↻ Refresh</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Version</th>
              <th>Date</th>
              <th>MC Score</th>
              <th>Open</th>
              <th>Time</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>`;

    if (!sessions.length) {
      html += '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:40px">No attempts yet.</td></tr>';
    }

    sessions.forEach(s => {
      const isComplete = !!s.completed_at;
      const pct = s.mc_total > 0 ? Math.round((s.mc_score / s.mc_total) * 100) : null;
      const pctStr = pct !== null ? `${pct}%` : '—';
      const pctColor = pct === null ? '' : pct >= 75 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)';
      const date = s.started_at ? new Date(s.started_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
      const timeStr = s.time_ms ? formatTime(s.time_ms) : '—';
      const openStr = s.open_score !== null && s.open_score !== undefined ? `${s.open_score}/15` : 'Pending';
      const statusBadge = !isComplete
        ? '<span class="badge badge-muted">In Progress</span>'
        : s.reviewed
        ? '<span class="badge badge-green">Reviewed</span>'
        : '<span class="badge badge-yellow">Needs Review</span>';

      html += `<tr class="${!isComplete ? 'incomplete' : ''}">
        <td><strong>${escH(s.student_name)}</strong></td>
        <td>v${s.version}</td>
        <td>${date}</td>
        <td style="color:${pctColor};font-weight:700">${s.mc_score ?? 0}/${s.mc_total ?? 0} <span style="color:var(--muted);font-weight:normal">(${pctStr})</span></td>
        <td>${openStr}</td>
        <td style="color:var(--muted)">${timeStr}</td>
        <td>${statusBadge}</td>
        <td>
          ${isComplete ? `<button class="btn btn-primary" style="padding:6px 14px;font-size:0.78rem" onclick="openDetail('${s.id}')">Review</button>` : ''}
        </td>
      </tr>`;
    });

    html += `</tbody></table></div>

      <!-- ── Paper Tests section ── -->
      <div class="paper-section">
        <div class="toolbar">
          <h2>🖨️ Paper Tests</h2>
          <select id="print-version-select" class="paper-version-select">
            <option value="0">Random version</option>
            ${Array.from({length: 10}, (_, i) => `<option value="${i+1}">Version ${i+1}</option>`).join('')}
          </select>
          <button class="btn btn-green" onclick="generatePrintTest()">🖨️ Generate &amp; Print</button>
          <button class="btn btn-muted" onclick="loadPaperTests()">↻ Refresh</button>
          <button class="btn btn-primary" onclick="openScanPanel()">📷 Grade a Scan</button>
        </div>
        <div id="paper-tests-table"><div class="spinner" style="width:24px;height:24px;margin:20px auto"></div></div>
      </div>
    `;
    document.getElementById('app-content').innerHTML = html;
    loadPaperTests();
  }

  // ── Paper Tests ──────────────────────────────────────────────────────────
  let printSessions = [];

  async function generatePrintTest() {
    const version = parseInt(document.getElementById('print-version-select').value, 10) || 0;
    try {
      const btn = event.target;
      btn.disabled = true; btn.textContent = '⏳ Generating…';
      const r = await fetch('/api/print/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ version }),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Failed'); }
      const html = await r.text();
      // Open in new tab
      const blob = new Blob([html], { type: 'text/html' });
      const url  = URL.createObjectURL(blob);
      window.open(url, '_blank');
      toast('✅ Test generated — printing in new tab');
      loadPaperTests();
    } catch (err) {
      toast('❌ ' + err.message);
    } finally {
      const btn2 = document.querySelector('button[onclick="generatePrintTest()"]');
      if (btn2) { btn2.disabled = false; btn2.textContent = '🖨️ Generate & Print'; }
    }
  }

  async function loadPaperTests() {
    const wrap = document.getElementById('paper-tests-table');
    if (!wrap) return;
    try {
      const r = await fetch('/api/print/list');
      printSessions = await r.json();
      renderPaperTests();
    } catch {
      if (wrap) wrap.innerHTML = '<p style="color:var(--muted);padding:12px">Could not load paper tests.</p>';
    }
  }

  function renderPaperTests() {
    const wrap = document.getElementById('paper-tests-table');
    if (!wrap) return;
    if (!printSessions.length) {
      wrap.innerHTML = '<p style="color:var(--muted);padding:12px">No paper tests generated yet.</p>';
      return;
    }
    let html = `<div class="table-wrap"><table>
      <thead><tr>
        <th>Code</th><th>Version</th><th>Generated</th><th>Student</th>
        <th>MC Score</th><th>Open</th><th>Graded</th><th></th>
      </tr></thead><tbody>`;
    printSessions.forEach(p => {
      const date = new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      const gradedDate = p.graded_at ? new Date(p.graded_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
      const mcStr  = p.mc_score !== null && p.mc_score !== undefined ? `${p.mc_score}/${p.mc_total}` : '—';
      const openStr = p.open_score !== null && p.open_score !== undefined ? `${p.open_score}/15` : '—';
      const statusBadge = p.graded_at
        ? '<span class="badge badge-green">Graded</span>'
        : '<span class="badge badge-yellow">Pending</span>';
      html += `<tr>
        <td><span class="code-chip">${escH(p.short_code)}</span></td>
        <td>v${p.version}</td>
        <td style="color:var(--muted)">${date}</td>
        <td>${p.student_name ? escH(p.student_name) : '<span style="color:var(--muted)">—</span>'}</td>
        <td>${mcStr}</td>
        <td>${openStr}</td>
        <td>${statusBadge} <span style="color:var(--muted);font-size:0.78rem">${gradedDate}</span></td>
        <td style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-primary" style="padding:5px 12px;font-size:0.76rem"
            onclick="openScanPanel('${escH(p.short_code)}')">📷 Grade</button>
          <button class="btn btn-red" style="padding:5px 10px;font-size:0.76rem"
            onclick="deletePrintTest('${escH(p.id)}')">🗑</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    wrap.innerHTML = html;
  }

  async function deletePrintTest(id) {
    if (!confirm('Delete this paper test record? This cannot be undone.')) return;
    try {
      const r = await fetch(`/api/print/${id}`, { method: 'DELETE' });
      if (r.ok) { toast('Deleted.'); loadPaperTests(); }
      else { toast('Delete failed.'); }
    } catch { toast('Network error.'); }
  }

  // ── Scan panel ───────────────────────────────────────────────────────────
  function openScanPanel(code) {
    document.getElementById('scan-code').value = code || '';
    document.getElementById('scan-student').value = '';
    document.getElementById('scan-file').value = '';
    document.getElementById('scan-status').textContent = '';
    document.getElementById('scan-result').innerHTML = '';
    document.getElementById('scan-submit-btn').disabled = false;
    document.getElementById('scan-submit-btn').textContent = '✨ Grade with AI';
    document.getElementById('scan-panel').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeScanPanel() {
    document.getElementById('scan-panel').classList.remove('open');
    document.body.style.overflow = '';
  }

  async function submitScan() {
    const code    = document.getElementById('scan-code').value.trim().toUpperCase();
    const student = document.getElementById('scan-student').value.trim();
    const fileEl  = document.getElementById('scan-file');
    const file    = fileEl.files[0];
    const btn     = document.getElementById('scan-submit-btn');
    const status  = document.getElementById('scan-status');

    if (!code) { status.textContent = '⚠️ Enter the test code first.'; return; }
    if (!file) { status.textContent = '⚠️ Select an answer sheet image.'; return; }

    btn.disabled = true;
    btn.textContent = '⏳ Uploading…';
    status.textContent = 'Converting image…';

    try {
      // Convert to base64
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      btn.textContent = '🤖 Grading with AI…';
      status.textContent = 'Sending to Claude Vision — this may take 20–40 seconds…';

      const r = await fetch('/api/print/grade', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          shortCode:  code,
          imageData:  base64,
          mimeType:   file.type,
          studentName: student,
        }),
      });

      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Grading failed');

      status.textContent = '✅ Grading complete!';
      showScanResult(data);
      loadPaperTests();
    } catch (err) {
      status.textContent = '❌ ' + err.message;
      btn.disabled = false;
      btn.textContent = '✨ Grade with AI';
    }
  }

  function showScanResult(data) {
    const MC_WEIGHTS = { 'Fiesta Fatal': 20, 'Conjugation': 20, 'Vocabulary': 10 };
    const mcPct = data.mcTotal > 0 ? Math.round((data.mcScore / data.mcTotal) * 100) : 0;
    const pctColor = mcPct >= 75 ? 'var(--green)' : mcPct >= 60 ? 'var(--yellow)' : 'var(--red)';
    const openScore = data.openScore !== null && data.openScore !== undefined ? data.openScore : '—';
    const total = typeof data.openScore === 'number' ? data.mcScore + data.openScore : '—';

    // Detailed per-question breakdown
    const detail = data.detail || [];
    let detailHtml = '';
    const sectionMap = {};
    detail.forEach(q => {
      const sec = q.section || 'Unknown';
      if (!sectionMap[sec]) sectionMap[sec] = [];
      sectionMap[sec].push(q);
    });
    Object.entries(sectionMap).forEach(([sec, qs]) => {
      const correct = qs.filter(q => q.isCorrect).length;
      detailHtml += `<div style="font-size:0.8rem;font-weight:bold;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">${escH(sec)} — ${correct}/${qs.length}</div>`;
      qs.forEach(q => {
        const icon = q.isCorrect ? '✅' : '❌';
        const markedStyle = q.isCorrect ? 'color:var(--green)' : 'color:var(--red)';
        detailHtml += `<div class="grade-q-row">
          <div class="gq-num">Q${q.q}</div>
          <div class="gq-marked" style="${markedStyle}">${escH(q.marked || '?')}</div>
          ${!q.isCorrect ? `<div style="font-size:0.78rem;color:var(--muted)">(key: <strong style="color:var(--green)">${escH(q.correct)}</strong>)</div>` : ''}
        </div>`;
      });
    });

    document.getElementById('scan-result').innerHTML = `
      <div class="grade-result-box">
        <h3>📊 Grading Results — ${escH(data.studentName || 'Unknown Student')}</h3>
        <div style="display:flex;gap:28px;flex-wrap:wrap;margin-bottom:16px">
          <div>
            <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">MC Score</div>
            <div class="grade-result-score" style="color:${pctColor}">${data.mcScore}/${data.mcTotal}</div>
            <div style="font-size:0.8rem;color:var(--muted)">${mcPct}%</div>
          </div>
          <div>
            <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Open Response</div>
            <div class="grade-result-score">${openScore}/15</div>
          </div>
          <div>
            <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Total</div>
            <div class="grade-result-score">${total}/65</div>
          </div>
        </div>

        ${data.openResponse ? `
        <div style="margin-bottom:10px">
          <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Student's Open Response</div>
          <div class="open-response-box">${escH(data.openResponse)}</div>
          <div class="open-q-box">🤖 AI Feedback: ${escH(data.openEval || '—')}</div>
        </div>` : ''}

        ${data.issues ? `<div style="background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:0.82rem;color:var(--red)">⚠️ Scan Issues: ${escH(data.issues)}</div>` : ''}

        <details>
          <summary style="cursor:pointer;font-size:0.82rem;color:var(--muted);margin-bottom:8px">View question-by-question breakdown (${detail.length} questions)</summary>
          <div style="max-height:300px;overflow-y:auto;margin-top:8px">${detailHtml}</div>
        </details>
      </div>
    `;
  }


  // ── Detail panel ──────────────────────────────────────────────────────────
  async function openDetail(id) {
    document.getElementById('detail-content').innerHTML = '<div class="spinner"></div>';
    document.getElementById('detail-panel').classList.add('open');
    document.body.style.overflow = 'hidden';

    try {
      const r = await fetch(`/api/admin/session/${id}`);
      const data = await r.json();
      renderDetail(data);
    } catch {
      document.getElementById('detail-content').innerHTML = '<p style="color:var(--red)">Failed to load.</p>';
    }
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    document.body.style.overflow = '';
  }

  function renderDetail(data) {
    const pct = data.mc_total > 0 ? Math.round((data.mc_score / data.mc_total) * 100) : 0;
    const date = new Date(data.started_at).toLocaleString('en-US');
    const timeStr = data.time_ms ? formatTime(data.time_ms) : '—';

    // Category breakdown from cat_json
    let cats = {};
    try { cats = JSON.parse(data.cat_json || '{}'); } catch (_) {}
    let catHtml = '';
    Object.entries(cats).forEach(([name, v]) => {
      const p = v.t > 0 ? Math.round((v.c / v.t) * 100) : 0;
      const color = p >= 75 ? 'var(--green)' : p >= 60 ? 'var(--yellow)' : 'var(--red)';
      catHtml += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:0.84rem">
        <div style="width:120px">${name}</div>
        <div style="flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${p}%;background:${color};border-radius:99px"></div>
        </div>
        <div style="width:45px;text-align:right;color:var(--muted)">${v.c}/${v.t}</div>
      </div>`;
    });

    // Question log
    let logHtml = '';
    (data.log || []).forEach(l => {
      const icon = l.is_correct ? '✅' : '❌';
      const section = l.section || '';
      logHtml += `<div class="log-row">
        <div class="icon">${icon}</div>
        <div class="q-text">
          <div>${escH(l.question)}</div>
          <div class="chosen">Chose: ${escH(l.chosen)}</div>
          ${!l.is_correct ? `<div class="answer">Correct: ${escH(l.correct_ans)}</div>` : ''}
        </div>
        <div style="color:var(--muted);font-size:0.72rem;flex-shrink:0">${section}</div>
      </div>`;
    });

    // Reading passage + open question
    const passageHtml = data.readingPassage
      ? `<div class="reading-passage-box">${escH(data.readingPassage)}</div>`
      : '';
    const openQHtml = data.openQuestion
      ? `<div class="open-q-box">❓ ${escH(data.openQuestion)}</div>`
      : '';

    const openHtml = data.open_response
      ? `<div class="open-response-box">${escH(data.open_response)}</div>`
      : '<p style="color:var(--muted);margin-bottom:16px">No response submitted.</p>';

    const currentOpenScore = data.open_score !== null && data.open_score !== undefined ? data.open_score : '';
    const currentNotes = data.admin_notes || '';

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-header">
        <h2>${escH(data.student_name)} — Version ${data.version}</h2>
        <div class="sub">${date} · ${timeStr} · MC: ${data.mc_score}/${data.mc_total} (${pct}%)</div>
      </div>

      <div class="detail-section">
        <h3>Category Breakdown</h3>
        ${catHtml || '<p style="color:var(--muted)">No category data.</p>'}
      </div>

      <div class="detail-section">
        <h3>Reading Passage (Version ${data.version})</h3>
        ${passageHtml || '<p style="color:var(--muted)">Passage not available.</p>'}
        ${openQHtml}

        <h3 style="margin-top:4px">Student's Open Response</h3>
        ${openHtml}

        <div class="rubric-box">
          <div class="rubric-title">Grading Rubric — Open Response (0–15 pts)</div>
          <div><strong>0 pts &nbsp;</strong> No attempt to answer the question</div>
          <div><strong>5 pts &nbsp;</strong> Basic answer with few words</div>
          <div><strong>10 pts</strong> Correct answer using correct conjugation and tense</div>
          <div><strong>15 pts</strong> Correct answer with correct conjugation, tense, and extended details</div>
        </div>

        <div class="grade-form">
          <label>Score (0, 5, 10, 15):</label>
          <select id="grade-score">
            ${[0,5,10,15].map(n => `<option value="${n}" ${n == currentOpenScore ? 'selected' : ''}>${n} pts</option>`).join('')}
          </select>
          <label>Notes:</label>
          <input type="text" id="grade-notes" placeholder="Optional feedback…" value="${escH(currentNotes)}" />
          <button class="btn btn-green" onclick="submitGrade('${data.id}')">Save Grade</button>
        </div>
      </div>

      <div class="detail-section">
        <h3>Question Log (${(data.log || []).length} questions)</h3>
        ${logHtml || '<p style="color:var(--muted)">No log data.</p>'}
      </div>

      <div style="margin-top:16px;text-align:right">
        <button class="btn btn-red" onclick="deleteSession('${data.id}')">🗑 Delete This Attempt</button>
      </div>
    `;
  }

  async function submitGrade(id) {
    const score = parseInt(document.getElementById('grade-score').value, 10);
    const notes = document.getElementById('grade-notes').value.trim();
    try {
      const r = await fetch(`/api/admin/grade/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ score, notes }),
      });
      if (r.ok) {
        toast('Grade saved!');
        loadDashboard();    // refresh table in background
      } else { toast('Save failed.'); }
    } catch { toast('Network error.'); }
  }

  async function regradeAll() {
    if (!confirm('This will reset ALL open-response scores and mark every attempt as "Needs Review" so you can re-grade them with the new 0–3 rubric.\n\nContinue?')) return;
    try {
      const r = await fetch('/api/admin/regrade-all', { method: 'POST' });
      const d = await r.json();
      if (r.ok) {
        toast(`✅ Reset ${d.count} attempt${d.count !== 1 ? 's' : ''} — ready to re-grade`);
        loadDashboard();
      } else {
        toast('Reset failed.');
      }
    } catch { toast('Network error.'); }
  }

  async function deletePartials() {
    const countEl = document.getElementById('partial-count');
    const n = parseInt(countEl ? countEl.textContent : '0', 10) || 0;
    if (!confirm(`Delete ${n} partial (incomplete) attempt${n !== 1 ? 's' : ''}?\n\nThese are sessions that were started but never submitted. This cannot be undone.`)) return;
    try {
      const r = await fetch('/api/admin/partials', { method: 'DELETE' });
      const d = await r.json();
      if (r.ok) {
        toast(`🗑️ Deleted ${d.count} partial attempt${d.count !== 1 ? 's' : ''}`);
        loadDashboard();
      } else { toast('Delete failed.'); }
    } catch { toast('Network error.'); }
  }

  async function deleteSession(id) {
    if (!confirm('Delete this attempt? This cannot be undone.')) return;
    try {
      const r = await fetch(`/api/admin/session/${id}`, { method: 'DELETE' });
      if (r.ok) {
        closeDetail();
        toast('Attempt deleted.');
        loadDashboard();
      } else { toast('Delete failed.'); }
    } catch { toast('Network error.'); }
  }

  // ── Utilities ─────────────────────────────────────────────────────────────
  function escH(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}m ${sec}s`;
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  (async () => {
    const loggedIn = await checkAuth();
    if (loggedIn) {
      document.getElementById('login-overlay').classList.add('hidden');
      loadDashboard();
    }
  })();
</script>
</body>
</html>
